<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pekingman</title>
    <meta name="description" content="Pekingman landing page">
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: #0b0d10;
        color: #f5f7fa;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .card {
        max-width: 760px;
        padding: 2rem;
        border: 1px solid #2b3340;
        border-radius: 20px;
        background: linear-gradient(135deg, #131821, #1a2230);
        box-shadow: 0 20px 55px rgba(0,0,0,0.35);
      }
      h1 { margin-top: 0; font-size: 2.2rem; }
      p { line-height: 1.6; color: #c7d0de; }
      a { color: #7dd3fc; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Pekingman</h1>
      <p>This repository now hosts a landing page for the Pekingman demo project.</p>
      <p><a href="../github-page/">Open the project demo page</a></p>
    </main>
  </body>
</html>
